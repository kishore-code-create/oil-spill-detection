{% extends 'base.html' %}
{% block content %}
<div style="margin-bottom: 30px;">
    <a href="{{ url_for('admin_users') }}" class="btn btn-outline" style="padding: 8px 16px;">
        <i class="fas fa-arrow-left"></i> Back to Users
    </a>
</div>

<div style="max-width: 700px; margin: 0 auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 30px;"><i class="fas fa-user-plus mr-2"></i>Create New Portal User</h2>

        <form method="POST">
            <div class="grid-3" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label class="form-label">Username (Login ID)</label>
                    <input type="text" name="username" class="form-control" required placeholder="e.g. john_doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Temporary Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Assigned Role</label>
                <select name="role" class="form-control" style="appearance: none; cursor: pointer;">
                    {% for r_key, r_name in ROLES.items() %}
                    <option value="{{ r_key }}" {% if r_key=='ngo' %}selected{% endif %}>{{ r_name }}</option>
                    {% endfor %}
                </select>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                    This determines which reports and severity levels the user can see.
                </p>
            </div>

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="e.g. John Doe">
            </div>

            <div class="form-group">
                <label class="form-label">Gmail Address (for notifications/OAuth)</label>
                <input type="email" name="email" class="form-control" placeholder="e.g. john.doe@gmail.com">
            </div>

            <div class="form-group" style="margin-bottom: 35px;">
                <label class="form-label">Organization / Company</label>
                <input type="text" name="organization" class="form-control" placeholder="e.g. World Wildlife Fund">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; padding: 16px; font-size: 1.1rem;">
                <i class="fas fa-check-circle"></i> Complete User Registration
            </button>
        </form>
    </div>
</div>
{% endblock %}
