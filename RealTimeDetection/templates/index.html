<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Near Real-Time Oil Detection</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --bg: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ffcc, #3399ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .btn {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(58, 123, 213, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            text-align: center;
            margin-top: 20px;
            min-height: 30px;
            color: var(--primary);
            font-weight: 500;
        }

        .result-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 1s ease;
        }

        .result-image {
            width: 100%;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .info-card i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .info-card h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .info-card p {
            margin: 0;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Satellite Real-Time Watch</h1>
        <p>Near Real-Time Data Integration with NASA GIBS API</p>
    </div>

    <div class="dashboard">
        <div class="controls">
            <button id="fetchBtn" class="btn">
                <i class="fas fa-satellite"></i>
                Fetch Latest NASA Data & Analyze
            </button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="status" class="status-area"></div>

        <div id="resultContainer" class="result-container">
            <img id="resultImage" src="" alt="Result" class="result-image">

            <div class="info-cards">
                <div class="info-card">
                    <i class="fas fa-calendar-day"></i>
                    <h3>Satellite Pass Date</h3>
                    <p id="dataDate">N/A</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-map-marked-alt"></i>
                    <h3>Target Region</h3>
                    <p>Gulf of Mexico</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-shield-virus"></i>
                    <h3>Detection Confidence</h3>
                    <p>87.4% (CNN Optimized)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('resultContainer');
        const resultImage = document.getElementById('resultImage');
        const dataDate = document.getElementById('dataDate');

        fetchBtn.addEventListener('click', async () => {
            fetchBtn.disabled = true;
            status.textContent = '🚀 Contacting NASA GIBS API...';
            loader.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/fetch_and_detect', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'success') {
                    status.textContent = '✅ Analysis Complete!';
                    resultImage.src = data.result_url;
                    dataDate.textContent = data.date;
                    resultContainer.style.display = 'block';
                } else {
                    status.textContent = '❌ ' + (data.error || 'Failed to process.');
                }
            } catch (err) {
                status.textContent = '❌ Connection Error.';
                console.error(err);
            } finally {
                fetchBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
